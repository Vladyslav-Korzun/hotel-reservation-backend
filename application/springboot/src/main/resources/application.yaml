spring:
  application:
    name: hotel-reservation-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_reservation
    driver-class-name: org.postgresql.Driver
    username: hotel_user
    password: hotel_password
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/hotel-reservation
          jwk-set-uri: http://localhost:8081/realms/hotel-reservation/protocol/openid-connect/certs

server:
  port: 8080
