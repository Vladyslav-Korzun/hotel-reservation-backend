openapi: 3.0.3
info:
  title: Hotel Reservation API
  version: 1.0.0
  description: |
    Hotel Reservation backend API for room availability search, reservation management,
    and staff stay operations.
servers:
  - url: http://localhost:8080
paths:
  /rooms/search:
    post:
      tags:
        - Rooms
      operationId: searchAvailableRooms
      summary: Search available rooms
      description: Returns room types with available inventory for the requested accommodation party.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchAvailableRoomsRequest'
            examples:
              familyWithPet:
                value:
                  city: Bratislava
                  checkIn: '2026-05-10'
                  checkOut: '2026-05-12'
                  adults: 2
                  childrenAges: [7, 1]
                  pets:
                    - type: DOG
                      size: SMALL
                      weightKg: 8
      responses:
        '200':
          description: Available room types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableRoomResponse'
        '400':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reservations:
    get:
      tags:
        - Reservations
      operationId: listReservations
      summary: List reservations
      description: Returns all reservations for staff and administrators.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
            default: 100
      responses:
        '200':
          description: Reservation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReservationResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Reservations
      operationId: createReservation
      summary: Create reservation
      description: Creates a new reservation for an accommodation party.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
            examples:
              familyWithPet:
                value:
                  hotelId: 1001
                  roomTypeId: 1102
                  checkIn: '2026-05-10'
                  checkOut: '2026-05-12'
                  adults: 2
                  childrenAges: [7, 1]
                  pets:
                    - type: DOG
                      size: SMALL
                      weightKg: 8
      responses:
        '201':
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservationResponse'
        '400':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reservations/{reservationId}:
    get:
      tags:
        - Reservations
      operationId: getReservation
      summary: Get reservation by id
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reservation not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reservations/{reservationId}/cancel:
    post:
      tags:
        - Reservations
      operationId: cancelReservation
      summary: Cancel reservation by id
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Reservation cancelled
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reservation not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /staff/reservations/{reservationId}/check-in:
    post:
      tags:
        - Staff Reservations
      operationId: checkInReservation
      summary: Check in reservation
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation checked in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '400':
          description: Business rule violation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reservation or room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /staff/reservations/{reservationId}/check-out:
    post:
      tags:
        - Staff Reservations
      operationId: checkOutReservation
      summary: Check out reservation
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation checked out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '400':
          description: Business rule violation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reservation or room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BookingPet:
      type: object
      required:
        - type
        - size
        - weightKg
      properties:
        type:
          type: string
          enum: [DOG, CAT, OTHER]
        size:
          type: string
          enum: [SMALL, MEDIUM, LARGE]
        weightKg:
          type: number
          minimum: 0
    SearchAvailableRoomsRequest:
      type: object
      required:
        - checkIn
        - checkOut
        - adults
      properties:
        city:
          type: string
        hotelId:
          type: integer
          format: int64
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        adults:
          type: integer
          minimum: 1
        childrenAges:
          type: array
          items:
            type: integer
            minimum: 0
        pets:
          type: array
          items:
            $ref: '#/components/schemas/BookingPet'
    CreateReservationRequest:
      type: object
      required:
        - hotelId
        - roomTypeId
        - checkIn
        - checkOut
        - adults
      properties:
        hotelId:
          type: integer
          format: int64
        roomTypeId:
          type: integer
          format: int64
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        adults:
          type: integer
          minimum: 1
        childrenAges:
          type: array
          items:
            type: integer
            minimum: 0
        pets:
          type: array
          items:
            $ref: '#/components/schemas/BookingPet'
    CreateReservationResponse:
      allOf:
        - $ref: '#/components/schemas/ReservationResponse'
    ReservationResponse:
      type: object
      required:
        - reservationId
        - hotelId
        - roomTypeId
        - checkIn
        - checkOut
        - adults
        - childrenAges
        - pets
        - status
        - createdAt
        - createdBy
      properties:
        reservationId:
          type: string
        hotelId:
          type: integer
          format: int64
        roomId:
          type: integer
          format: int64
          nullable: true
        roomTypeId:
          type: integer
          format: int64
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        adults:
          type: integer
        childrenAges:
          type: array
          items:
            type: integer
        pets:
          type: array
          items:
            $ref: '#/components/schemas/BookingPet'
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
    AvailableRoomResponse:
      type: object
      required:
        - hotelId
        - hotelName
        - roomTypeId
        - roomTypeName
        - maxAdults
        - maxChildren
        - maxInfants
        - maxTotalGuests
        - petsAllowed
        - maxPets
        - basePriceAmount
        - basePriceCurrency
        - availableCount
      properties:
        hotelId:
          type: integer
          format: int64
        hotelName:
          type: string
        roomTypeId:
          type: integer
          format: int64
        roomTypeName:
          type: string
        maxAdults:
          type: integer
        maxChildren:
          type: integer
        maxInfants:
          type: integer
        maxTotalGuests:
          type: integer
        petsAllowed:
          type: boolean
        maxPets:
          type: integer
        basePriceAmount:
          type: number
        basePriceCurrency:
          type: string
        availableCount:
          type: integer
    ErrorResponse:
      type: object
      description: RFC 7807 problem details response returned by the REST layer.
      properties:
        type:
          type: string
          example: about:blank
        title:
          type: string
          example: Validation failed
        status:
          type: integer
          format: int32
          example: 400
        detail:
          type: string
          example: checkOut must be after checkIn
        instance:
          type: string
          example: /reservations
