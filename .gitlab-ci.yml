stages:
  - build
  - deploy

variables:
  ACR_REGISTRY: "acrfsakorzunv.azurecr.io"
  IMAGE_NAME: "hotel-backend"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: "overlay2"

build_image:
  stage: build
  tags:
    - fsa-korzun
  image: docker:27.4.0
  services:
    - name: docker:27.4.0-dind
      command: ["--tls=false"]
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 2; echo "Waiting for Docker daemon"; done
    - echo "$DOCKER_PASSWORD" | docker login "$ACR_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin
    - export IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
  script:
    - docker build -t "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" -t "$ACR_REGISTRY/$IMAGE_NAME:latest" .
    - docker push "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
    - docker push "$ACR_REGISTRY/$IMAGE_NAME:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

deploy:
  stage: deploy
  tags:
    - fsa-korzun
  image:
    name: alpine/k8s:1.30.5
    entrypoint: [""]
  needs:
    - build_image
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_BASE64" | base64 -d > ~/.kube/config
    - export IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
  script:
    - kubectl -n app set image deployment/fsa-be fsa-be="$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
    - kubectl -n app rollout status deployment/fsa-be --timeout=600s
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
