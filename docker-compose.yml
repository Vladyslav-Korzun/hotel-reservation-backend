services:
  postgres:
    image: postgres:17
    container_name: hotel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hotel_reservation
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_password
    volumes:
      - hotel-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_reservation"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: hotel-keycloak
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: info
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - hotel-keycloak-data:/opt/keycloak/data

volumes:
  hotel-postgres-data:
  hotel-keycloak-data:
