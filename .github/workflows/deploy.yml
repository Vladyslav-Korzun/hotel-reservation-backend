name: Build and deploy backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ACR_REGISTRY: acrfsakorzunv.azurecr.io
  IMAGE_NAME: hotel-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          docker build \
            -t "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" \
            -t "$ACR_REGISTRY/$IMAGE_NAME:latest" \
            .
          docker push "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          docker push "$ACR_REGISTRY/$IMAGE_NAME:latest"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy backend
        run: |
          kubectl -n app set image deployment/fsa-be fsa-be="$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          kubectl -n app rollout status deployment/fsa-be --timeout=180s

